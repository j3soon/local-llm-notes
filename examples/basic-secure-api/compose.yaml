services:
  llm:
    image: ${LLAMA_CPP_IMAGE}
    container_name: local-llm-llama-cpp
    restart: unless-stopped
    gpus: all
    command: >-
      -hf ggml-org/gpt-oss-120b-GGUF
      --port 37000
      --ctx-size 0
      --jinja
      -ub 2048
      -b 2048
    expose:
      - "37000"
    ports:
      - "127.0.0.1:38000:37000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:37000"]
    volumes:
      - ../../.cache:/root/.cache

  nginx:
    image: nginx:1.29
    container_name: local-llm-nginx
    restart: unless-stopped
    depends_on:
      - llm
    env_file:
      - .env
    ports:
      - "80:80"
      - "37000:37000"
    command: ["/bin/sh", "/opt/nginx/start-nginx.sh"]
    volumes:
      - ./nginx-http01.conf:/opt/nginx/nginx-http01.conf.template:ro
      - ./nginx-tls.conf:/opt/nginx/nginx-tls.conf.template:ro
      - ./scripts/start-nginx.sh:/opt/nginx/start-nginx.sh:ro
      - ./state/letsencrypt:/etc/letsencrypt
      - ./state/www:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    container_name: local-llm-certbot
    restart: unless-stopped
    depends_on:
      - nginx
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - /opt/certbot/certbot-loop.sh
    volumes:
      - ./scripts/certbot-loop.sh:/opt/certbot/certbot-loop.sh:ro
      - ./state/letsencrypt:/etc/letsencrypt
      - ./state/www:/var/www/certbot

# `llm` stays private on the Compose network.
# `nginx` is the only public entrypoint for the API.
# Port 80 is exposed only for the Let's Encrypt HTTP challenge.
# Edit this file directly if you want a different model, API port, or llama.cpp flags.
